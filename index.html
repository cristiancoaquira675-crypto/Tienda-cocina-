<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Mi Tienda de Cocina</title>
    <style>
        body { font-family: Arial, sans-serif; margin: 0; padding: 20px; background-color: #f4f4f4; text-align: center; }
        header { background: #ff5722; color: white; padding: 20px; border-radius: 8px; }
        .container { display: flex; justify-content: center; gap: 20px; margin-top: 30px; flex-wrap: wrap; }
        .card { background: white; padding: 20px; border-radius: 8px; box-shadow: 0 4px 8px rgba(0,0,0,0.1); width: 200px; }
        h3 { color: #333; }
        p { color: #666; }
    </style>
</head>
<body>

    <header>
        <h1>Utensilios Esenciales de Cocina</h1>
        <p>Los mejores productos para tu hogar</p>
    </header>

    <div class="container">
        <div class="card">
            <h3>Sartén Antiadherente</h3>
            <p>Ideal para tus comidas diarias sin que nada se pegue.</p>
        </div>
        <div class="card">
            <h3>Cuchillo de Chef</h3>
            <p>Corte preciso y alta durabilidad para cualquier alimento.</p>
        </div>
        <div class="card">
            <h3>Tabla de Cortar</h3>
            <p>Hecha de madera resistente, fácil de limpiar y cuidar.</p>
        </div>
    </div>

</body>
</html>
